<!doctype html>
<html>
  <head>
    <title>Admin Login</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="../css/style.css" />

    <style>
      body {
        background: linear-gradient(135deg, #000428, #004e92);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: "Poppins", sans-serif;
      }

      .form-container {
        width: 320px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        text-align: center;
        color: white;
      }

      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 20px;
        border: none;
        outline: none;
      }

      .password-box {
        position: relative;
      }

      .password-box input {
        padding-right: 40px;
      }

      .password-box i {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #333;
      }

      button {
        width: 100%;
        padding: 12px;
        border-radius: 20px;
        border: none;
        background: #ff512f;
        color: white;
        cursor: pointer;
        margin-top: 10px;
      }

      button:hover {
        background: #dd2476;
      }

      .error {
        color: #ff4d4d;
        font-size: 14px;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="form-container">
      <h2>Admin Login</h2>

      <!-- ADMIN ID -->
      <input type="text" id="adminId" placeholder="Enter Admin ID" />

      <!-- PASSWORD -->
      <div class="password-box">
        <input type="password" id="password" placeholder="Password" />
        <i class="fa-solid fa-eye" onclick="togglePassword()"></i>
      </div>

      <button onclick="login()">Login</button>

      <p id="errorMsg" class="error"></p>
    </div>

    <script>
      // 👇 SIMULATED ADMIN DATABASE
      const adminDB = [
        { id: "admin1", password: "admin123", name: "Admin One" },
        { id: "admin2", password: "admin456", name: "Admin Two" },
      ];

      function togglePassword() {
        let pass = document.getElementById("password");
        let icon = document.querySelector(".password-box i");

        if (pass.type === "password") {
          pass.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          pass.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      }

      function login() {
        let id = document.getElementById("adminId").value.trim();
        let password = document.getElementById("password").value.trim();
        let error = document.getElementById("errorMsg");

        if (id === "" || password === "") {
          error.innerText = "Please fill all fields";
          return;
        }

        // 🔍 FIND ADMIN
        let admin = adminDB.find((a) => a.id === id && a.password === password);

        if (!admin) {
          error.innerText = "Invalid Admin Credentials";
          return;
        }

        // ✅ SAVE SESSION
        localStorage.setItem(
          "loggedInAdmin",
          JSON.stringify({
            name: admin.name,
            id: admin.id,
          }),
        );

        error.innerText = "";
        alert("Admin Login Successful ✅");

        window.location.href = "./dashboard.html";
      }
    </script>
  </body>
</html>
